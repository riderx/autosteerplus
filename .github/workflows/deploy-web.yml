name: Deploy Web

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-web.yml"
      - "package.json"
      - "bun.lock"
      - "index.html"
      - "vite.config.ts"
      - "wrangler.jsonc"
      - "src/**"
      - "big_raduis.png"
      - "tiny_radius.png"
      - "fsd_visualisation.png"
  workflow_dispatch:

concurrency:
  group: deploy-web
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy website to Cloudflare
        run: bun run deploy:web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
