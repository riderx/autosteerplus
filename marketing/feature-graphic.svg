<svg width="1024" height="500" viewBox="0 0 1024 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="84" y1="28" x2="944" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFF" />
      <stop offset="1" stop-color="#EEF4FF" />
    </linearGradient>
    <linearGradient id="blueGlow" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#6EB9FF" stop-opacity="0.55" />
      <stop offset="1" stop-color="#0A60FF" stop-opacity="0.15" />
