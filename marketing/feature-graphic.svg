    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.12" />
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.08" />
    </filter>
    <clipPath id="screenClip">
      <rect x="690" y="52" width="264" height="396" rx="34" />
    </clipPath>
    <clipPath id="fsdClip">
      <rect x="560" y="314" width="310" height="126" rx="24" />
