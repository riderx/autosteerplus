  <rect width="1024" height="500" rx="34" fill="url(#bg)" />

  <circle cx="910" cy="86" r="120" fill="url(#blueGlow)" />
  <circle cx="752" cy="414" r="138" fill="url(#blueGlow)" />
  <circle cx="156" cy="430" r="170" fill="#FFFFFF" fill-opacity="0.55" />

  <rect x="42" y="42" width="498" height="416" rx="32" fill="#FFFFFF" fill-opacity="0.82" stroke="#DDE6F6" />

  <rect x="74" y="74" width="74" height="74" rx="22" fill="#FFFFFF" stroke="#DDE6F6" />
  <image href="ios/App/App/Assets.xcassets/AppIcon.appiconset/AppIcon-512@2x.png" x="74" y="74" width="74" height="74" preserveAspectRatio="xMidYMid slice" />

  <text x="170" y="103" fill="#0F172A" font-family="Helvetica" font-size="20" font-weight="700" letter-spacing="0.5">autosteerplus</text>
  <text x="170" y="132" fill="#5B6472" font-family="Helvetica" font-size="17" font-weight="500">Native device portal for setup, OTA, and Bluetooth control.</text>

  <text x="74" y="208" fill="#0F172A" font-family="Helvetica" font-size="48" font-weight="700" letter-spacing="-1.5">Manage your</text>
  <text x="74" y="261" fill="#0F172A" font-family="Helvetica" font-size="48" font-weight="700" letter-spacing="-1.5">device on the go</text>

  <text x="74" y="311" fill="#5B6472" font-family="Helvetica" font-size="21" font-weight="500">Guided onboarding, device settings, OTA updates,</text>
  <text x="74" y="341" fill="#5B6472" font-family="Helvetica" font-size="21" font-weight="500">and visual verification in one mobile app.</text>

