<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>autosteerplus feature graphic</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Display", "Avenir Next",
          "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 1024px;
        height: 500px;
        margin: 0;
        overflow: hidden;
        background: #f2f6ff;
      }

      body {
        position: relative;
        background:
          radial-gradient(circle at 88% 16%, rgba(110, 185, 255, 0.34), transparent 26%),
          radial-gradient(circle at 72% 92%, rgba(10, 96, 255, 0.16), transparent 24%),
          linear-gradient(180deg, #f8faff 0%, #eef4ff 100%);
        color: #0f172a;
      }

      .glow {
        position: absolute;
        border-radius: 999px;
        filter: blur(18px);
        opacity: 0.6;
        pointer-events: none;
      }

      .glow-a {
        top: 28px;
        right: 42px;
        width: 180px;
        height: 180px;
        background: rgba(10, 96, 255, 0.14);
      }

      .glow-b {
        bottom: -26px;
        right: 170px;
        width: 200px;
        height: 200px;
        background: rgba(110, 185, 255, 0.22);
      }

      .logo-ghost {
        position: absolute;
        right: 122px;
        top: 98px;
        width: 220px;
        height: 220px;
        object-fit: cover;
        border-radius: 56px;
        opacity: 0.12;
        filter: blur(1px);
        pointer-events: none;
      }

      .layout {
        position: relative;
        display: grid;
        grid-template-columns: 520px 1fr;
        gap: 20px;
        width: 100%;
        height: 100%;
        padding: 42px;
      }

      .copy {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 30px 32px;
        border: 1px solid #dde6f6;
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.85);
        box-shadow:
          0 1px 2px rgba(15, 23, 42, 0.04),
          0 18px 34px rgba(15, 23, 42, 0.06);
        backdrop-filter: blur(14px);
      }

      .brand {
        display: flex;
        gap: 18px;
        align-items: center;
      }

      .brand img {
        width: 88px;
        height: 88px;
        border-radius: 28px;
        box-shadow: 0 14px 26px rgba(10, 96, 255, 0.16);
      }

      .brand-kicker {
        margin: 0 0 8px;
        color: #5b6472;
        font-size: 18px;
        font-weight: 600;
      }

      .brand-name {
        margin: 0;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      h1 {
        margin: 0;
        font-size: 54px;
        line-height: 0.96;
        letter-spacing: -0.06em;
      }

      .lede {
        margin: 18px 0 0;
        color: #5b6472;
        font-size: 22px;
        line-height: 1.38;
        letter-spacing: -0.02em;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      .chip {
        padding: 11px 16px;
        border-radius: 999px;
        background: #e8f0ff;
        color: #0a60ff;
        font-size: 17px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      .visuals {
        position: relative;
      }

      .portal-card {
        position: absolute;
        top: 8px;
        right: 28px;
        width: 270px;
        height: 404px;
        overflow: hidden;
        border: 1px solid #dde6f6;
        border-radius: 36px;
        background: rgba(255, 255, 255, 0.95);
        box-shadow:
          0 1px 2px rgba(15, 23, 42, 0.04),
          0 24px 36px rgba(15, 23, 42, 0.12);
      }

      .portal-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center top;
      }

      .fsd-card {
        position: absolute;
        left: 0;
        bottom: 18px;
        width: 316px;
        height: 132px;
        overflow: hidden;
        border: 1px solid #dde6f6;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.95);
        box-shadow:
          0 1px 2px rgba(15, 23, 42, 0.04),
          0 16px 26px rgba(15, 23, 42, 0.08);
      }

      .fsd-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center center;
      }

      .pill {
        position: absolute;
        left: 18px;
        bottom: 16px;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.74);
        color: #fff;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      .device-badge {
        position: absolute;
        right: 28px;
        bottom: 10px;
        padding: 11px 18px;
        border: 1px solid #dde6f6;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.95);
        color: #0f172a;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: -0.02em;
        box-shadow: 0 10px 18px rgba(15, 23, 42, 0.08);
      }
    </style>
  </head>
  <body>
    <div class="glow glow-a"></div>
    <div class="glow glow-b"></div>
    <img class="logo-ghost" src="../marketing/applus_logo.png" alt="" />

    <main class="layout">
      <section class="copy">
        <div>
          <div class="brand">
            <img src="../marketing/applus_logo.png" alt="autosteerplus logo" />
            <div>
              <p class="brand-kicker">autosteerplus</p>
              <p class="brand-name">Device portal for your phone</p>
            </div>
          </div>

          <div style="margin-top: 28px">
            <h1>Manage your device on the go</h1>
            <p class="lede">
              Guided onboarding, Bluetooth controls, OTA installs, and visual checks in one native mobile app.
            </p>
          </div>
        </div>

        <div class="chips">
          <span class="chip">Bluetooth</span>
          <span class="chip">OTA updates</span>
          <span class="chip">FSD docs</span>
        </div>
      </section>

      <section class="visuals" aria-label="App preview">
        <div class="portal-card">
          <img src="../IMG_0541.PNG" alt="autosteerplus portal screenshot" />
        </div>

        <div class="fsd-card">
          <img src="../fsd_in_Action.JPG" alt="FSD visualization in action" />
          <span class="pill">FSD in action</span>
        </div>

        <div class="device-badge">iPhone + Android</div>
      </section>
    </main>
  </body>
</html>
